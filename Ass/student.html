<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Checker</title>
</head>
<body>

    <style>
        body{
    font-family: Arial, sans-serif;
    background-color: lightblue;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container{
    background-color: white;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    width: 350px;
}

h1{
    color: darkblue;
}

button{
    background-color: blue;
    color: white;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 5px;
    font-size: 16px;
}

button:hover{
    background-color: darkblue;
}

#result{
    margin-top: 20px;
    font-size: 18px;
    color: black;
}
    </style>
    <div class="container">
        <h1>Student Result Checker</h1>

        <button onclick="checkResult()">
            Check Result
        </button>

        <div id="result"></div>
    </div>

    <script src="../Ass/student.js"></script>
</body>
</html>
