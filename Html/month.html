<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Days Checker</title>

  <style>

    body {
      background-color: black;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background-color: #222;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }

    h1 {
      color: orange;
      margin-bottom: 15px;
    }

    p {
      margin-bottom: 20px;
    }

    button {
      background-color: orange;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: darkorange;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>Days In A Month Checker</h1>

    <p>
      Click the button below to check
      the number of days in a month.
    </p>

    <button onclick="checkDays()">
      Open Days Checker
    </button>

  </div>

  <script src="../JS/month.js"></script>

</body>
</html>
